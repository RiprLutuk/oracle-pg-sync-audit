tables:
  - name: public.sample_customer
    oracle_to_postgres_mode: truncate
    directions:
      - oracle-to-postgres
    key_columns:
      - customer_id
    where: "status = 'ACTIVE'"
    incremental:
      enabled: true
      strategy: updated_at
      column: updated_at
      initial_value: null
      overlap_minutes: 5
      delete_detection: false
    validation:
      checksum:
        enabled: true
        mode: chunk
        chunk_key: customer_id
        batch_size: 5000
        columns: auto
        exclude_columns: []

  - name: public.sample_order
    oracle_to_postgres_mode: truncate
    postgres_to_oracle_mode: upsert
    directions:
      - oracle-to-postgres
      - postgres-to-oracle
    key_columns:
      - order_id
    incremental:
      enabled: true
      strategy: numeric_key
      column: order_id
      initial_value: 0

  - source_schema: SAMPLE_APP
    source_table: SAMPLE_BLOB_TABLE
    target_schema: public
    target_table: sample_blob_table
    oracle_to_postgres_mode: truncate
    directions:
      - oracle-to-postgres
    primary_key:
      - record_id
    lob_strategy:
      columns:
        BLOB_PAYLOAD:
          strategy: stream
          target_type: bytea
          validation: size_hash
        NOTE_CLOB:
          strategy: stream
          target_type: text
          validation: size
    validation:
      checksum:
        enabled: true
        mode: chunk
        chunk_key: record_id
        exclude_columns:
          - BLOB_PAYLOAD
          - NOTE_CLOB
